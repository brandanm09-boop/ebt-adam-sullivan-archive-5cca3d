<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EBT - Adam Sullivan — archive</title>
<style>
  :root{ --bg:#0e0e10; --card:#1a1a1e; --line:#2a2a31; --acc:#0db39e; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#ececf0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
  header{padding:16px 16px 8px}
  h1{font-size:18px;margin:0}
  .sub{color:#9a9aa5;font-size:12px;margin-top:3px}
  .bar{position:sticky;top:0;z-index:20;background:rgba(14,14,16,.96);backdrop-filter:blur(8px);
       padding:10px 16px;border-bottom:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  input,select{background:#1a1a1e;color:#ececf0;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;outline:none}
  input#q{flex:1;min-width:160px}
  select:focus,input:focus{border-color:var(--acc)}
  .count{color:#9a9aa5;font-size:12px;margin-left:auto;white-space:nowrap}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:14px 16px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;
        display:flex;flex-direction:column;transition:transform .08s,border-color .08s}
  .card:hover{transform:translateY(-2px);border-color:var(--acc)}
  .thumbwrap{position:relative;aspect-ratio:1/1;background:#222}
  .thumbwrap a.thumb{display:block;width:100%;height:100%}
  .thumbwrap img{width:100%;height:100%;object-fit:cover;display:block}
  .badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.65);border-radius:6px;padding:2px 6px;font-size:11px}
  .dl{position:absolute;bottom:6px;right:6px;width:30px;height:30px;border-radius:50%;
      background:var(--acc);color:#04201c;display:flex;align-items:center;justify-content:center;
      font-size:15px;font-weight:800;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.45)}
  .dl:hover{filter:brightness(1.1)}
  .copy{position:absolute;bottom:6px;left:6px;width:30px;height:30px;border-radius:50%;
        background:rgba(0,0,0,.62);color:#fff;border:1px solid #3a3a44;cursor:pointer;
        display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.45)}
  .copy:hover{background:rgba(0,0,0,.85)}
  .copy.ok{background:var(--acc);color:#04201c;border-color:var(--acc)}
  .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#555;font-size:11px}
  .meta{padding:7px 9px 9px;text-decoration:none;color:inherit;display:block}
  .row{display:flex;justify-content:space-between;font-size:11px;color:#9a9aa5}
  .n{color:var(--acc);font-weight:700}
  .cap{font-size:11px;color:#cfcfd6;line-height:1.32;margin-top:4px;
       display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .empty{padding:40px;text-align:center;color:#9a9aa5}
  .top{position:fixed;right:16px;bottom:16px;background:var(--acc);color:#04201c;border:none;border-radius:50%;
       width:46px;height:46px;font-size:20px;cursor:pointer;display:none;box-shadow:0 4px 14px rgba(0,0,0,.4)}
</style>
</head>
<body>
<header>
  <h1>EBT - Adam Sullivan</h1>
  <div class="sub"><a href="https://www.instagram.com/evidencebased_training/" target="_blank" rel="noopener" style="color:#0db39e;text-decoration:none">@evidencebased_training</a> · <span id="range">loading…</span></div>
</header>
<div class="bar">
  <input id="q" placeholder="Search captions…">
  <select id="type"><option value="">All types</option><option>Video</option><option>Photo</option><option>Carousel</option></select>
  <select id="year"><option value="">All years</option></select>
  <select id="sort">
    <option value="old">Oldest first</option>
    <option value="new">Newest first</option>
    <option value="likes">Most liked</option>
    <option value="comments">Most comments</option>
  </select>
  <span class="count" id="count"></span>
</div>
<div class="grid" id="grid"></div>
<button class="top" id="top" title="Back to top">↑</button>
<script>
const TYPE_ICON={Video:"🎬",Photo:"◻",Carousel:"▦"};
let DATA=[];
const grid=document.getElementById('grid');
const $=id=>document.getElementById(id);
function fmt(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+'k':n}
function copyLink(e,btn,url){
  e.preventDefault(); e.stopPropagation();
  const done=()=>{const o=btn.textContent;btn.textContent='✓';btn.classList.add('ok');setTimeout(()=>{btn.textContent=o;btn.classList.remove('ok')},1100)};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(done).catch(()=>{prompt('Copy link:',url)});}
  else{const t=document.createElement('textarea');t.value=url;document.body.appendChild(t);t.select();try{document.execCommand('copy')}catch(_){}t.remove();done();}
}
function render(){
  const q=$('q').value.toLowerCase().trim();
  const ty=$('type').value, yr=$('year').value, sort=$('sort').value;
  let rows=DATA.filter(d=>
    (!q||d.cap.toLowerCase().includes(q)) && (!ty||d.type===ty) && (!yr||d.date.startsWith(yr)));
  rows.sort((a,b)=> sort==='new'? b.date.localeCompare(a.date)
    : sort==='likes'? b.likes-a.likes
    : sort==='comments'? b.comments-a.comments
    : a.date.localeCompare(b.date));
  $('count').textContent=`${rows.length} of ${DATA.length} posts`;
  if(!rows.length){grid.innerHTML='<div class="empty">No posts match.</div>';return;}
  grid.innerHTML=rows.map(d=>{
    const img=d.thumb?`<img loading="lazy" src="thumbs_all/${String(d.i).padStart(4,'0')}.jpg">`:'<div class="noimg">no thumb</div>';
    const dl=d.video?`<a class="dl" href="${d.video}" target="_blank" rel="noopener" download="${d.date}-${d.i+1}.mp4" title="Download video">⬇</a>`:'';
    return `<div class="card">
      <div class="thumbwrap"><a class="thumb" href="${d.url}" target="_blank" rel="noopener">${img}</a>
        <span class="badge">${TYPE_ICON[d.type]||''}</span>
        <button class="copy" title="Copy Instagram link" onclick="copyLink(event,this,'${d.url}')">🔗</button>${dl}</div>
      <a class="meta" href="${d.url}" target="_blank" rel="noopener">
        <div class="row"><span class="n">#${d.i+1}</span><span>${d.date}</span></div>
        <div class="row"><span>♥ ${fmt(d.likes)}</span><span>💬 ${fmt(d.comments)}</span></div>
        <div class="cap">${d.cap.replace(/</g,'&lt;')}</div></a></div>`;
  }).join('');
}
['q','type','year','sort'].forEach(id=>$(id).addEventListener('input',render));
addEventListener('scroll',()=>{$('top').style.display=scrollY>600?'block':'none'});
$('top').onclick=()=>scrollTo({top:0,behavior:'smooth'});
fetch('data.json').then(r=>r.json()).then(d=>{
  DATA=d;
  const years=[...new Set(d.map(x=>x.date.slice(0,4)))].filter(Boolean).sort();
  $('year').innerHTML='<option value="">All years</option>'+years.map(y=>`<option>${y}</option>`).join('');
  const dates=d.map(x=>x.date).filter(Boolean).sort();
  $('range').textContent=`${d.length} posts · ${dates[0]} → ${dates[dates.length-1]} · ⬇ on a video downloads it · tap a post to open it on Instagram`;
  render();
});
</script>
</body>
</html>
